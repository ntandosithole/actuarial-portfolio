name: Publish Quarto website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render website
        run: quarto render

      - name: Publish rendered site to gh-pages
        run: |
          set -euo pipefail

          touch _site/.nojekyll
          echo "ntandosithole.com" > _site/CNAME
          rm -rf /tmp/quarto-site
          cp -R _site /tmp/quarto-site

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages --depth=1 || true

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R /tmp/quarto-site/. .

          git add -A
          git commit -m "Deploy Quarto site from ${GITHUB_SHA}" || exit 0
          git push origin gh-pages
