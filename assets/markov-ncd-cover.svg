<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title description">
  <title id="title">No-claims discount Markov chain</title>
  <desc id="description">Four rating classes connected by transition paths over an abstract actuarial data background.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2742"/>
      <stop offset="1" stop-color="#174a69"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6bd1c9"/>
      <stop offset="1" stop-color="#d9c8a9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0 0l10 5-10 5z" fill="#86d9d2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#071827" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#background)"/>
  <g opacity=".12" stroke="#fff">
    <path d="M0 120h1200M0 240h1200M0 360h1200M0 480h1200M0 600h1200"/>
    <path d="M120 0v675M300 0v675M480 0v675M660 0v675M840 0v675M1020 0v675"/>
  </g>
  <path d="M0 535c160-54 248-193 398-170 154 24 202 145 344 98 139-46 211-231 458-279v491H0z" fill="#2a8c8c" opacity=".22"/>
  <path d="M0 590c176-18 270-98 421-75 165 26 227 93 376 45 157-51 242-126 403-134v249H0z" fill="#d9c8a9" opacity=".14"/>
  <g fill="none" stroke="url(#path)" stroke-width="8" marker-end="url(#arrow)">
    <path d="M240 337C340 237 400 237 500 337"/>
    <path d="M520 337C620 237 680 237 780 337"/>
    <path d="M800 337C900 237 960 237 1060 337"/>
  </g>
  <g filter="url(#shadow)" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">
    <g transform="translate(180 337)">
      <circle r="78" fill="#fff"/>
      <circle r="68" fill="#174a69"/>
      <text y="10" font-size="42" fill="#fff">1</text>
    </g>
    <g transform="translate(460 337)">
      <circle r="78" fill="#fff"/>
      <circle r="68" fill="#1d647a"/>
      <text y="10" font-size="42" fill="#fff">2</text>
    </g>
    <g transform="translate(740 337)">
      <circle r="78" fill="#fff"/>
      <circle r="68" fill="#26858a"/>
      <text y="10" font-size="42" fill="#fff">3</text>
    </g>
    <g transform="translate(1020 337)">
      <circle r="78" fill="#fff"/>
      <circle r="68" fill="#2a8c8c"/>
      <text y="10" font-size="42" fill="#fff">4</text>
    </g>
  </g>
  <g font-family="Arial, sans-serif" fill="#fff">
    <text x="70" y="86" font-size="30" font-weight="700" letter-spacing="3">ACTUARIAL MODELLING</text>
    <text x="70" y="132" font-size="24" opacity=".72">Rating-class migration and premium projection</text>
  </g>
</svg>
